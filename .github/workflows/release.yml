name: Create Tag and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional, e.g. v0.2.0). If empty, will use current git tag or create one automatically"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false
      upload_tos:
        description: "Upload to Volcengine TOS"
        required: false
        type: boolean
        default: true

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from git
        id: get-version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # If tag is provided via workflow_dispatch, use it
          if [ -n "$INPUT_TAG" ]; then
            VERSION="$INPUT_TAG"
            TAG="$INPUT_TAG"
          else
            # Try to get version from current git tag
            VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
            # If VERSION contains a dash (like v0.2.0-3-gabc), extract the tag part
            if [[ "$VERSION" == v*-* ]]; then
              TAG=$(echo "$VERSION" | cut -d'-' -f1)
            elif [[ "$VERSION" == v* ]]; then
              TAG="$VERSION"
            else
              # Create a tag from commit
              TAG="v0.0.0-$(git rev-parse --short=8 HEAD)"
              VERSION="$TAG"
            fi
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION (tag: $TAG)"

  create-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: get-version
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  release:
    name: GoReleaser Release
    runs-on: ubuntu-latest
    needs: get-version
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go from go.mod
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}
          GOVERSION: ${{ steps.setup-go.outputs.go-version }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          NIGHTLY_BUILD: ${{ needs.get-version.outputs.tag }}

      - name: Apply release flags
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.get-version.outputs.tag }}"
          gh release edit "$TAG" \
            --draft=${{ inputs.draft }} \
            --prerelease=${{ inputs.prerelease }}

  upload-tos:
    name: Upload to TOS
    needs: [get-version, release]
    if: ${{ github.event_name == 'push' || inputs.upload_tos }}
    uses: ./.github/workflows/upload-tos.yml
    with:
      tag: ${{ needs.get-version.outputs.tag }}
    secrets: inherit
